<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🗺️ Toprak Savaşları - Strateji Oyunu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #gameCanvas {
            display: block;
            cursor: crosshair;
        }

        /* ÜST BAR */
        #topBar {
            position: absolute;
            top: 0; left: 0; width: 100%;
            height: 40px;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            padding: 0 10px;
            z-index: 100;
            border-bottom: 1px solid #333;
        }
        #topBar .stat {
            color: #fff;
            font-size: 13px;
            margin-right: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .stat .label { color: #888; }
        .stat .value { color: #0f0; font-weight: bold; }
        .stat .value.troops { color: #4af; }
        .stat .value.land { color: #fa4; }

        /* MINI HARİTA */
        #minimap {
            position: absolute;
            bottom: 10px; right: 10px;
            width: 180px; height: 180px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #444;
            border-radius: 4px;
            z-index: 100;
        }
        #minimapCanvas {
            width: 100%; height: 100%;
            border-radius: 3px;
        }

        /* SKOR TABLOSU */
        #leaderboard {
            position: absolute;
            top: 50px; right: 10px;
            width: 200px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #444;
            border-radius: 6px;
            z-index: 100;
            max-height: 300px;
            overflow-y: auto;
        }
        #leaderboard h3 {
            color: #fff;
            font-size: 13px;
            padding: 8px 10px;
            border-bottom: 1px solid #333;
            margin: 0;
        }
        .lb-entry {
            display: flex;
            align-items: center;
            padding: 4px 10px;
            font-size: 12px;
            color: #ccc;
            border-bottom: 1px solid #1a1a1a;
        }
        .lb-entry.me { background: rgba(255,255,255,0.05); color: #fff; font-weight: bold; }
        .lb-rank { width: 22px; color: #888; }
        .lb-color {
            width: 12px; height: 12px;
            border-radius: 2px;
            margin-right: 6px;
            flex-shrink: 0;
        }
        .lb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .lb-land { color: #fa4; margin-left: 8px; font-size: 11px; }
        .lb-troops { color: #4af; margin-left: 6px; font-size: 11px; }

        /* KONTROL PANELİ */
        #controls {
            position: absolute;
            bottom: 10px; left: 10px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #444;
            border-radius: 6px;
            padding: 10px;
            z-index: 100;
        }
        #controls label {
            color: #aaa;
            font-size: 12px;
            display: block;
            margin-bottom: 4px;
        }
        #attackSlider {
            width: 180px;
            accent-color: #f44;
        }
        #sliderValue {
            color: #fff;
            font-size: 13px;
            font-weight: bold;
        }
        .ctrl-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .ctrl-btn {
            padding: 4px 10px;
            font-size: 11px;
            border: 1px solid #555;
            background: #2a2a3e;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }
        .ctrl-btn:hover { background: #3a3a5e; }
        .ctrl-btn.active { border-color: #0f0; color: #0f0; }

        /* BAŞLANGIÇ EKRANI */
        #startScreen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a1e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        #startScreen h1 {
            color: #fff;
            font-size: 48px;
            margin-bottom: 5px;
            text-shadow: 0 0 30px rgba(100,150,255,0.5);
        }
        #startScreen h2 {
            color: #668;
            font-size: 18px;
            font-weight: normal;
            margin-bottom: 30px;
        }
        #startScreen input {
            padding: 12px 20px;
            font-size: 18px;
            border: 2px solid #446;
            background: #1a1a2e;
            color: #fff;
            border-radius: 8px;
            width: 280px;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
        }
        #startScreen input:focus { border-color: #68f; }
        .settings-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .setting-option {
            padding: 8px 16px;
            border: 1px solid #446;
            border-radius: 6px;
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .setting-option:hover { border-color: #68f; color: #fff; }
        .setting-option.selected { border-color: #4f4; color: #4f4; background: rgba(0,255,0,0.05); }
        #startBtn {
            padding: 14px 60px;
            font-size: 20px;
            border: 2px solid #4af;
            background: transparent;
            color: #4af;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            margin-top: 10px;
        }
        #startBtn:hover {
            background: #4af;
            color: #000;
            box-shadow: 0 0 30px rgba(68,170,255,0.5);
        }
        .start-label {
            color: #668;
            font-size: 13px;
            margin-bottom: 6px;
        }

        /* BİLDİRİMLER */
        #notifications {
            position: absolute;
            top: 50px; left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            pointer-events: none;
        }
        .notification {
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 13px;
            animation: fadeOut 3s forwards;
            border-left: 3px solid #4af;
        }
        .notification.attack { border-left-color: #f44; }
        .notification.capture { border-left-color: #4f4; }
        .notification.defeat { border-left-color: #ff0; }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        /* OYUN SONU */
        #gameOver {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        #gameOver h1 { color: #fff; font-size: 44px; margin-bottom: 10px; }
        #gameOver .go-stats { color: #aaa; font-size: 18px; margin-bottom: 8px; }
        #gameOver .go-score { color: #4f4; font-size: 32px; margin-bottom: 20px; }
        #restartBtn {
            padding: 12px 50px;
            font-size: 18px;
            border: 2px solid #4af;
            background: transparent;
            color: #4af;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }
        #restartBtn:hover { background: #4af; color: #000; }

        /* ZOOM KONTROLÜ */
        #zoomControls {
            position: absolute;
            bottom: 200px; right: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 100;
        }
        .zoom-btn {
            width: 36px; height: 36px;
            border: 1px solid #555;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 20px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .zoom-btn:hover { background: #3a3a5e; }

        /* SPEED CONTROLS */
        #speedControls {
            position: absolute;
            top: 45px; left: 10px;
            display: flex;
            gap: 4px;
            z-index: 100;
        }
        .speed-btn {
            padding: 3px 10px;
            font-size: 12px;
            border: 1px solid #444;
            background: rgba(0,0,0,0.7);
            color: #aaa;
            border-radius: 3px;
            cursor: pointer;
        }
        .speed-btn.active { border-color: #4af; color: #4af; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<canvas id="minimapCanvas" width="180" height="180" style="display:none;"></canvas>

<!-- BAŞLANGIÇ -->
<div id="startScreen">
    <h1>🗺️ Toprak Savaşları</h1>
    <h2>Haritayı fethet, düşmanları yok et!</h2>
    <input type="text" id="playerName" placeholder="İsmini gir..." maxlength="16" value="">
    <div class="start-label">Harita Boyutu</div>
    <div class="settings-row" id="mapSizeOptions">
        <div class="setting-option" data-value="small">Küçük</div>
        <div class="setting-option selected" data-value="medium">Orta</div>
        <div class="setting-option" data-value="large">Büyük</div>
    </div>
    <div class="start-label">Bot Sayısı</div>
    <div class="settings-row" id="botCountOptions">
        <div class="setting-option" data-value="5">5</div>
        <div class="setting-option selected" data-value="10">10</div>
        <div class="setting-option" data-value="20">20</div>
        <div class="setting-option" data-value="30">30</div>
    </div>
    <div class="start-label">Zorluk</div>
    <div class="settings-row" id="difficultyOptions">
        <div class="setting-option" data-value="easy">Kolay</div>
        <div class="setting-option selected" data-value="normal">Normal</div>
        <div class="setting-option" data-value="hard">Zor</div>
    </div>
    <button id="startBtn">BAŞLA</button>
</div>

<!-- ÜST BAR -->
<div id="topBar" style="display:none;">
    <div class="stat">
        <span class="label">Toprak:</span>
        <span class="value land" id="myLand">0</span>
    </div>
    <div class="stat">
        <span class="label">Asker:</span>
        <span class="value troops" id="myTroops">0</span>
    </div>
    <div class="stat">
        <span class="label">Gelir:</span>
        <span class="value" id="myIncome">+0/s</span>
    </div>
    <div class="stat">
        <span class="label">Oyuncular:</span>
        <span class="value" id="aliveCount">0</span>
    </div>
    <div class="stat">
        <span class="label">Süre:</span>
        <span class="value" id="gameTime">0:00</span>
    </div>
</div>

<!-- HIZ KONTROL -->
<div id="speedControls" style="display:none;">
    <div class="speed-btn" data-speed="0">⏸</div>
    <div class="speed-btn active" data-speed="1">▶</div>
    <div class="speed-btn" data-speed="2">▶▶</div>
    <div class="speed-btn" data-speed="3">▶▶▶</div>
</div>

<!-- SKOR TABLOSU -->
<div id="leaderboard" style="display:none;">
    <h3>🏆 Skor Tablosu</h3>
    <div id="lbEntries"></div>
</div>

<!-- MİNİ HARİTA -->
<div id="minimap" style="display:none;"></div>

<!-- KONTROLLER -->
<div id="controls" style="display:none;">
    <div class="ctrl-row">
        <label>Saldırı Gücü: <span id="sliderValue">50%</span></label>
    </div>
    <div class="ctrl-row">
        <input type="range" id="attackSlider" min="1" max="100" value="50">
    </div>
    <div class="ctrl-row">
        <div class="ctrl-btn" id="btnAttack" title="Toprak seç ve saldır">⚔️ Saldır</div>
        <div class="ctrl-btn" id="btnDonate" title="Müttefike asker gönder">🤝 Bağış</div>
    </div>
</div>

<!-- ZOOM -->
<div id="zoomControls" style="display:none;">
    <div class="zoom-btn" id="zoomIn">+</div>
    <div class="zoom-btn" id="zoomOut">−</div>
</div>

<!-- BİLDİRİMLER -->
<div id="notifications"></div>

<!-- OYUN SONU -->
<div id="gameOver">
    <h1 id="goTitle">🏆 Kazandın!</h1>
    <div class="go-stats" id="goStats"></div>
    <div class="go-score" id="goScore"></div>
    <button id="restartBtn">TEKRAR OYNA</button>
</div>

<script>
// ==================================================================
//  TOPRAK SAVAŞLARI - ANA OYUN MOTORU
// ==================================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimapCanvas');
const mmCtx = mmCanvas.getContext('2d');

// === OYUN DURUMU ===
let GAME = {
    running: false,
    speed: 1,
    time: 0,
    tick: 0,
    mapW: 0,
    mapH: 0,
    cellSize: 0,
    gridW: 0,
    gridH: 0,
    grid: [],          // Her hücre: { owner: id, troops: n }
    players: [],
    playerID: 0,
    difficulty: 'normal',
    selectedTarget: -1,
    attackPercent: 50,
    mode: 'attack',    // 'attack' | 'donate'
    camera: { x: 0, y: 0, zoom: 1 },
    dragging: false,
    dragStart: { x: 0, y: 0 },
    camStart: { x: 0, y: 0 },
    mouseWorld: { x: 0, y: 0 },
    hoverCell: null,
    notifications: [],
    eliminatedPlayers: new Set()
};

// === BOT İSİMLERİ ===
const BOT_NAMES = [
    'İmparator', 'Fatih', 'Cengiz', 'Sezar', 'İskender', 'Napolyon',
    'Atilla', 'Timur', 'Hannibal', 'Yavuz', 'Kanuni', 'Barbaros',
    'Melikşah', 'Osman', 'Kılıç', 'Alparslan', 'Bayezid', 'Mete',
    'Tomris', 'Zenobia', 'Kleopatra', 'Boudica', 'Vikingleri', 'Samurai',
    'Şövalye', 'Centurion', 'Gladyatör', 'Spartalı', 'Kaptan', 'Amiral',
    'General', 'Mareşal', 'Sultan', 'Kral', 'Dük', 'Lord'
];

// === RENK PALETİ ===
const COLORS = [
    '#4488ff', '#ff4444', '#44cc44', '#ff8800', '#cc44cc', '#44cccc',
    '#ffcc00', '#ff44aa', '#88cc44', '#4444cc', '#cc8844', '#44ff88',
    '#aa44ff', '#ff6666', '#66ccaa', '#cc6644', '#88aaff', '#ffaa44',
    '#44aacc', '#cc44aa', '#aacc44', '#6644cc', '#44cc88', '#ff88cc',
    '#88ff44', '#4488cc', '#ccaa44', '#cc4488', '#44ccaa', '#aa88ff',
    '#ff4488', '#88cc88'
];

// === BAŞLANGIÇ MENÜSÜ ===
let mapSize = 'medium';
let botCount = 10;
let difficulty = 'normal';

document.querySelectorAll('#mapSizeOptions .setting-option').forEach(el => {
    el.addEventListener('click', () => {
        document.querySelectorAll('#mapSizeOptions .setting-option').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        mapSize = el.dataset.value;
    });
});
document.querySelectorAll('#botCountOptions .setting-option').forEach(el => {
    el.addEventListener('click', () => {
        document.querySelectorAll('#botCountOptions .setting-option').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        botCount = parseInt(el.dataset.value);
    });
});
document.querySelectorAll('#difficultyOptions .setting-option').forEach(el => {
    el.addEventListener('click', () => {
        document.querySelectorAll('#difficultyOptions .setting-option').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        difficulty = el.dataset.value;
    });
});

document.querySelectorAll('.speed-btn').forEach(el => {
    el.addEventListener('click', () => {
        document.querySelectorAll('.speed-btn').forEach(e => e.classList.remove('active'));
        el.classList.add('active');
        GAME.speed = parseInt(el.dataset.speed);
    });
});

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', () => {
    document.getElementById('gameOver').style.display = 'none';
    document.getElementById('startScreen').style.display = 'flex';
});

document.getElementById('attackSlider').addEventListener('input', (e) => {
    GAME.attackPercent = parseInt(e.target.value);
    document.getElementById('sliderValue').textContent = GAME.attackPercent + '%';
});

document.getElementById('btnAttack').addEventListener('click', () => {
    GAME.mode = 'attack';
    document.getElementById('btnAttack').classList.add('active');
    document.getElementById('btnDonate').classList.remove('active');
});
document.getElementById('btnDonate').addEventListener('click', () => {
    GAME.mode = 'donate';
    document.getElementById('btnDonate').classList.add('active');
    document.getElementById('btnAttack').classList.remove('active');
});

document.getElementById('zoomIn').addEventListener('click', () => {
    GAME.camera.zoom = Math.min(GAME.camera.zoom * 1.3, 8);
});
document.getElementById('zoomOut').addEventListener('click', () => {
    GAME.camera.zoom = Math.max(GAME.camera.zoom / 1.3, 0.3);
});

// === CANVAS BOYUTLAMA ===
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ==================================================================
//  HARİTA OLUŞTURMA
// ==================================================================
function generateMap() {
    const sizes = {
        small: { w: 120, h: 80, cell: 8 },
        medium: { w: 200, h: 140, cell: 6 },
        large: { w: 300, h: 200, cell: 5 }
    };
    const s = sizes[mapSize];
    GAME.gridW = s.w;
    GAME.gridH = s.h;
    GAME.cellSize = s.cell;
    GAME.mapW = s.w * s.cell;
    GAME.mapH = s.h * s.cell;

    // Perlin-benzeri gürültü ile kara/deniz haritası oluştur
    GAME.grid = [];
    const noiseScale = 0.04;
    const landThreshold = 0.38;

    // Basit gürültü oluşturucu
    const seed = Math.random() * 10000;
    function noise2D(x, y) {
        const n = Math.sin(x * 12.9898 + y * 78.233 + seed) * 43758.5453;
        return n - Math.floor(n);
    }

    function smoothNoise(x, y, scale) {
        const sx = x * scale;
        const sy = y * scale;
        const ix = Math.floor(sx);
        const iy = Math.floor(sy);
        const fx = sx - ix;
        const fy = sy - iy;

        const a = noise2D(ix, iy);
        const b = noise2D(ix + 1, iy);
        const c = noise2D(ix, iy + 1);
        const d = noise2D(ix + 1, iy + 1);

        const i1 = a + (b - a) * fx;
        const i2 = c + (d - c) * fx;
        return i1 + (i2 - i1) * fy;
    }

    function fbm(x, y) {
        let v = 0;
        v += smoothNoise(x, y, 0.02) * 0.5;
        v += smoothNoise(x, y, 0.05) * 0.3;
        v += smoothNoise(x, y, 0.1) * 0.15;
        v += smoothNoise(x, y, 0.2) * 0.05;
        return v;
    }

    for (let y = 0; y < GAME.gridH; y++) {
        for (let x = 0; x < GAME.gridW; x++) {
            const idx = y * GAME.gridW + x;
            const n = fbm(x, y);

            // Kenarları deniz yap
            const edgeDist = Math.min(x, y, GAME.gridW - x - 1, GAME.gridH - y - 1);
            const edgeFactor = Math.min(1, edgeDist / 15);
            const val = n * edgeFactor;

            const isLand = val > landThreshold;
            GAME.grid[idx] = {
                owner: isLand ? -1 : -2,   // -1=sahipsiz kara, -2=deniz
                troops: 0,
                elevation: val,
                terrain: isLand ? (val > 0.65 ? 'mountain' : val > 0.55 ? 'forest' : 'plains') : 'water'
            };
        }
    }

    // Adaları temizle (küçük kara parçalarını sil)
    cleanSmallIslands(20);
}

function cleanSmallIslands(minSize) {
    const visited = new Array(GAME.gridW * GAME.gridH).fill(false);

    for (let y = 0; y < GAME.gridH; y++) {
        for (let x = 0; x < GAME.gridW; x++) {
            const idx = y * GAME.gridW + x;
            if (visited[idx] || GAME.grid[idx].owner === -2) continue;

            // BFS ile ada boyutunu bul
            const island = [];
            const queue = [{ x, y }];
            visited[idx] = true;

            while (queue.length > 0) {
                const p = queue.shift();
                island.push(p);
                const neighbors = getNeighbors(p.x, p.y);
                for (const n of neighbors) {
                    const ni = n.y * GAME.gridW + n.x;
                    if (!visited[ni] && GAME.grid[ni].owner !== -2) {
                        visited[ni] = true;
                        queue.push(n);
                    }
                }
            }

            if (island.length < minSize) {
                island.forEach(p => {
                    GAME.grid[p.y * GAME.gridW + p.x].owner = -2;
                    GAME.grid[p.y * GAME.gridW + p.x].terrain = 'water';
                });
            }
        }
    }
}

function getNeighbors(x, y) {
    const n = [];
    if (x > 0) n.push({ x: x - 1, y });
    if (x < GAME.gridW - 1) n.push({ x: x + 1, y });
    if (y > 0) n.push({ x, y: y - 1 });
    if (y < GAME.gridH - 1) n.push({ x, y: y + 1 });
    return n;
}

// ==================================================================
//  OYUNCU OLUŞTURMA
// ==================================================================
function createPlayers() {
    GAME.players = [];
    GAME.eliminatedPlayers = new Set();

    const playerName = document.getElementById('playerName').value.trim() || 'Oyuncu';
    const totalPlayers = botCount + 1;

    // Karaya yerleşim noktaları bul
    const landCells = [];
    for (let y = 0; y < GAME.gridH; y++) {
        for (let x = 0; x < GAME.gridW; x++) {
            if (GAME.grid[y * GAME.gridW + x].owner === -1) {
                landCells.push({ x, y });
            }
        }
    }

    // Oyuncuları yerleştir (birbirinden uzak)
    const spawnPoints = [];
    for (let i = 0; i < totalPlayers; i++) {
        let bestPoint = null;
        let bestDist = 0;

        for (let attempt = 0; attempt < 200; attempt++) {
            const cell = landCells[Math.floor(Math.random() * landCells.length)];
            let minDist = Infinity;
            for (const sp of spawnPoints) {
                const d = Math.hypot(cell.x - sp.x, cell.y - sp.y);
                minDist = Math.min(minDist, d);
            }
            if (spawnPoints.length === 0) minDist = Infinity;
            if (minDist > bestDist) {
                bestDist = minDist;
                bestPoint = cell;
            }
        }
        spawnPoints.push(bestPoint);
    }

    // Oyuncuları oluştur
    const shuffledNames = BOT_NAMES.sort(() => Math.random() - 0.5);
    for (let i = 0; i < totalPlayers; i++) {
        const isPlayer = i === 0;
        const sp = spawnPoints[i];

        const player = {
            id: i,
            name: isPlayer ? playerName : shuffledNames[i - 1] || ('Bot ' + i),
            color: COLORS[i % COLORS.length],
            isBot: !isPlayer,
            alive: true,
            troops: 0,
            landCount: 0,
            totalTroopsProduced: 0,
            // Bot AI
            ai: {
                attackTimer: 0,
                targetPlayer: -1,
                aggression: 0.3 + Math.random() * 0.7,
                expandRate: difficulty === 'easy' ? 0.3 : difficulty === 'hard' ? 0.9 : 0.6
            }
        };

        GAME.players.push(player);

        // Başlangıç topraklarını ver (daire şeklinde)
        const radius = 3;
        for (let dy = -radius; dy <= radius; dy++) {
            for (let dx = -radius; dx <= radius; dx++) {
                if (dx * dx + dy * dy > radius * radius) continue;
                const nx = sp.x + dx;
                const ny = sp.y + dy;
                if (nx < 0 || nx >= GAME.gridW || ny < 0 || ny >= GAME.gridH) continue;
                const idx = ny * GAME.gridW + nx;
                if (GAME.grid[idx].owner === -2) continue;
                GAME.grid[idx].owner = i;
                GAME.grid[idx].troops = 2;
            }
        }
    }

    GAME.playerID = 0;
    updatePlayerStats();

    // Kamerayı oyuncu pozisyonuna getir
    const sp = spawnPoints[0];
    GAME.camera.x = sp.x * GAME.cellSize - canvas.width / 2;
    GAME.camera.y = sp.y * GAME.cellSize - canvas.height / 2;
    GAME.camera.zoom = 2;
}

function updatePlayerStats() {
    GAME.players.forEach(p => {
        p.troops = 0;
        p.landCount = 0;
    });

    for (let i = 0; i < GAME.grid.length; i++) {
        const cell = GAME.grid[i];
        if (cell.owner >= 0) {
            GAME.players[cell.owner].troops += cell.troops;
            GAME.players[cell.owner].landCount++;
        }
    }

    // Elenen oyuncuları kontrol et
    GAME.players.forEach(p => {
        if (p.alive && p.landCount === 0) {
            p.alive = false;
            GAME.eliminatedPlayers.add(p.id);
            if (p.id === GAME.playerID) {
                endGame(false);
            } else {
                addNotification(`${p.name} elendi!`, 'defeat');
            }
        }
    });
}

// ==================================================================
//  OYUN MEKANİKLERİ
// ==================================================================
function gameTick() {
    if (!GAME.running || GAME.speed === 0) return;

    GAME.tick++;

    // Her tick'te asker üretimi
    if (GAME.tick % 15 === 0) {
        for (let i = 0; i < GAME.grid.length; i++) {
            const cell = GAME.grid[i];
            if (cell.owner >= 0 && cell.owner < GAME.players.length) {
                // Arazi türüne göre üretim
                let production = 0.5;
                if (cell.terrain === 'plains') production = 0.8;
                else if (cell.terrain === 'forest') production = 0.5;
                else if (cell.terrain === 'mountain') production = 0.3;

                cell.troops += production;
                GAME.players[cell.owner].totalTroopsProduced += production;
            }
        }
    }

    // Bot AI
    if (GAME.tick % 8 === 0) {
        runBotAI();
    }

    // İstatistikleri güncelle
    if (GAME.tick % 10 === 0) {
        updatePlayerStats();
        updateUI();
        checkWinCondition();
    }

    GAME.time += 1 / 60;
}

function runBotAI() {
    GAME.players.forEach(p => {
        if (!p.isBot || !p.alive) return;

        const diffMult = difficulty === 'easy' ? 0.4 : difficulty === 'hard' ? 1.2 : 0.7;

        // Sınır hücrelerini bul
        const borderCells = [];
        for (let y = 0; y < GAME.gridH; y++) {
            for (let x = 0; x < GAME.gridW; x++) {
                const idx = y * GAME.gridW + x;
                if (GAME.grid[idx].owner !== p.id) continue;

                const neighbors = getNeighbors(x, y);
                for (const n of neighbors) {
                    const ni = n.y * GAME.gridW + n.x;
                    const nc = GAME.grid[ni];
                    if (nc.owner !== p.id && nc.owner !== -2) {
                        borderCells.push({ x, y, nx: n.x, ny: n.y, targetOwner: nc.owner });
                    }
                }
            }
        }

        if (borderCells.length === 0) return;

        // Saldırı kararı
        const attackChance = p.ai.aggression * p.ai.expandRate * diffMult;
        const numAttacks = Math.floor(1 + attackChance * 3);

        for (let a = 0; a < numAttacks; a++) {
            if (borderCells.length === 0) break;

            // Hedef seç (öncelik: sahipsiz arazi > zayıf düşman)
            let best = null;
            let bestScore = -Infinity;

            for (const bc of borderCells) {
                const targetIdx = bc.ny * GAME.gridW + bc.nx;
                const targetCell = GAME.grid[targetIdx];
                const sourceIdx = bc.y * GAME.gridW + bc.x;
                const sourceCell = GAME.grid[sourceIdx];

                let score = 0;
                if (targetCell.owner === -1) {
                    score = 10; // Sahipsiz arazi
                } else if (targetCell.owner >= 0) {
                    const enemy = GAME.players[targetCell.owner];
                    score = 5 - targetCell.troops;
                    if (enemy && enemy.landCount < p.landCount * 0.5) score += 3; // Zayıf düşman
                }
                score += sourceCell.troops * 0.5;
                score += Math.random() * 3;

                if (score > bestScore) {
                    bestScore = score;
                    best = bc;
                }
            }

            if (best) {
                const srcIdx = best.y * GAME.gridW + best.x;
                const dstIdx = best.ny * GAME.gridW + best.nx;
                const srcCell = GAME.grid[srcIdx];
                const dstCell = GAME.grid[dstIdx];

                const sendPercent = 0.3 + Math.random() * 0.5;
                const attackTroops = Math.floor(srcCell.troops * sendPercent);

                if (attackTroops > 1) {
                    executeBattle(srcIdx, dstIdx, attackTroops, p.id);
                }
            }
        }
    });
}

function executeBattle(srcIdx, dstIdx, attackTroops, attackerID) {
    const srcCell = GAME.grid[srcIdx];
    const dstCell = GAME.grid[dstIdx];

    if (srcCell.troops < attackTroops) attackTroops = Math.floor(srcCell.troops * 0.8);
    if (attackTroops <= 0) return;

    srcCell.troops -= attackTroops;

    if (dstCell.owner === -2) return; // Denize saldırılamaz

    if (dstCell.owner === -1) {
        // Sahipsiz araziyi fethet
        dstCell.owner = attackerID;
        dstCell.troops = attackTroops;
    } else if (dstCell.owner === attackerID) {
        // Kendi toprağına takviye
        dstCell.troops += attackTroops;
    } else {
        // Savaş!
        const defenderTroops = dstCell.troops;
        const defenderID = dstCell.owner;

        // Arazi bonusu
        let defenseBonus = 1.0;
        if (dstCell.terrain === 'mountain') defenseBonus = 1.4;
        else if (dstCell.terrain === 'forest') defenseBonus = 1.2;

        const effectiveDefense = defenderTroops * defenseBonus;

        if (attackTroops > effectiveDefense) {
            // Saldırgan kazandı
            const remaining = Math.floor(attackTroops - effectiveDefense * 0.7);
            dstCell.owner = attackerID;
            dstCell.troops = Math.max(1, remaining);

            // Bildirim
            if (attackerID === GAME.playerID) {
                addNotification(`Toprak fethettiniz!`, 'capture');
            } else if (defenderID === GAME.playerID) {
                addNotification(`${GAME.players[attackerID].name} toprağınızı aldı!`, 'attack');
            }
        } else {
            // Savunma kazandı
            const remaining = Math.floor(effectiveDefense - attackTroops * 0.8);
            dstCell.troops = Math.max(1, remaining);
        }
    }
}

// === OYUNCU SALDIRISI ===
function playerAttack(targetX, targetY) {
    const targetIdx = targetY * GAME.gridW + targetX;
    const targetCell = GAME.grid[targetIdx];

    if (targetCell.owner === -2) return; // Deniz
    if (targetCell.owner === GAME.playerID && GAME.mode !== 'donate') return;

    // Sınır komşu hücreleri bul
    const neighbors = getNeighbors(targetX, targetY);
    let bestSource = null;
    let bestTroops = 0;

    // Tüm oyuncunun sınır hücrelerinden saldır
    const attackSources = [];

    for (const n of neighbors) {
        const ni = n.y * GAME.gridW + n.x;
        if (GAME.grid[ni].owner === GAME.playerID) {
            attackSources.push(ni);
        }
    }

    if (attackSources.length === 0) {
        // Uzaktan toplu saldırı - tüm sınırdan
        massAttack(targetX, targetY);
        return;
    }

    // Kaynaktan asker gönder
    let totalSent = 0;
    attackSources.forEach(srcIdx => {
        const srcCell = GAME.grid[srcIdx];
        const sendAmount = Math.floor(srcCell.troops * GAME.attackPercent / 100);
        if (sendAmount > 0) {
            totalSent += sendAmount;
        }
    });

    if (totalSent > 0) {
        // Her kaynaktan orantılı gönder
        let troopsToSend = 0;
        attackSources.forEach(srcIdx => {
            const srcCell = GAME.grid[srcIdx];
            const sendAmount = Math.floor(srcCell.troops * GAME.attackPercent / 100);
            if (sendAmount > 0) {
                troopsToSend += sendAmount;
                srcCell.troops -= sendAmount;
            }
        });

        if (GAME.mode === 'donate' && targetCell.owner >= 0 && targetCell.owner !== GAME.playerID) {
            // Bağış modu - askerleri hedefe ekle (müttefik desteği)
            targetCell.troops += troopsToSend;
            addNotification(`${troopsToSend} asker bağışlandı`, 'capture');
        } else {
            executeBattle(attackSources[0], targetIdx, troopsToSend, GAME.playerID);
        }
    }
}

function massAttack(targetX, targetY) {
    const targetIdx = targetY * GAME.gridW + targetX;
    const targetCell = GAME.grid[targetIdx];
    if (targetCell.owner === -2 || targetCell.owner === GAME.playerID) return;

    // BFS ile hedefin çevresindeki tüm oyuncu hücrelerinden saldır
    const visited = new Set();
    const queue = [{ x: targetX, y: targetY, dist: 0 }];
    visited.add(targetIdx);

    const sources = [];
    const maxDist = 15;

    while (queue.length > 0) {
        const p = queue.shift();
        if (p.dist > maxDist) continue;

        const neighbors = getNeighbors(p.x, p.y);
        for (const n of neighbors) {
            const ni = n.y * GAME.gridW + n.x;
            if (visited.has(ni)) continue;
            visited.add(ni);

            if (GAME.grid[ni].owner === GAME.playerID) {
                sources.push(ni);
            }
            queue.push({ x: n.x, y: n.y, dist: p.dist + 1 });
        }
    }

    if (sources.length === 0) return;

    // Tüm kaynaklardan asker topla
    let totalTroops = 0;
    sources.forEach(srcIdx => {
        const sendAmount = Math.floor(GAME.grid[srcIdx].troops * GAME.attackPercent / 100);
        if (sendAmount > 0) {
            totalTroops += sendAmount;
            GAME.grid[srcIdx].troops -= sendAmount;
        }
    });

    if (totalTroops > 0) {
        executeBattle(sources[0], targetIdx, totalTroops, GAME.playerID);
    }
}

// ==================================================================
//  RENDER
// ==================================================================
function render() {
    ctx.fillStyle = '#0a1628';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (!GAME.running) return;

    const cam = GAME.camera;
    const cs = GAME.cellSize * cam.zoom;

    // Görünür alan hesapla
    const startX = Math.max(0, Math.floor(cam.x / (GAME.cellSize * cam.zoom)));
    const startY = Math.max(0, Math.floor(cam.y / (GAME.cellSize * cam.zoom)));
    const endX = Math.min(GAME.gridW, Math.ceil((cam.x + canvas.width) / (GAME.cellSize * cam.zoom)) + 1);
    const endY = Math.min(GAME.gridH, Math.ceil((cam.y + canvas.height) / (GAME.cellSize * cam.zoom)) + 1);

    // Hücreleri çiz
    for (let y = startY; y < endY; y++) {
        for (let x = startX; x < endX; x++) {
            const idx = y * GAME.gridW + x;
            const cell = GAME.grid[idx];
            const sx = x * cs - cam.x;
            const sy = y * cs - cam.y;

            if (cell.owner === -2) {
                // Deniz
                const depth = 0.3 + cell.elevation * 0.5;
                const r = Math.floor(10 * depth);
                const g = Math.floor(30 * depth);
                const b = Math.floor(60 + 40 * depth);
                ctx.fillStyle = `rgb(${r},${g},${b})`;
            } else if (cell.owner === -1) {
                // Sahipsiz kara
                if (cell.terrain === 'mountain') {
                    ctx.fillStyle = '#4a4a3a';
                } else if (cell.terrain === 'forest') {
                    ctx.fillStyle = '#2a3a1a';
                } else {
                    ctx.fillStyle = '#3a3a2a';
                }
            } else {
                // Oyuncu toprağı
                const player = GAME.players[cell.owner];
                if (player) {
                    let color = player.color;
                    // Yüksekliğe göre gölge
                    const brightness = 0.7 + cell.elevation * 0.5;
                    ctx.fillStyle = adjustBrightness(color, brightness);
                }
            }

            ctx.fillRect(sx, sy, cs + 1, cs + 1);

            // Sınır çiz (yakınlaştırıldığında)
            if (cs > 4 && cell.owner >= 0) {
                const neighbors = getNeighbors(x, y);
                for (const n of neighbors) {
                    const ni = n.y * GAME.gridW + n.x;
                    if (GAME.grid[ni].owner !== cell.owner) {
                        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                        ctx.lineWidth = 1;
                        if (n.x < x) { ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx, sy + cs); ctx.stroke(); }
                        if (n.x > x) { ctx.beginPath(); ctx.moveTo(sx + cs, sy); ctx.lineTo(sx + cs, sy + cs); ctx.stroke(); }
                        if (n.y < y) { ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx + cs, sy); ctx.stroke(); }
                        if (n.y > y) { ctx.beginPath(); ctx.moveTo(sx, sy + cs); ctx.lineTo(sx + cs, sy + cs); ctx.stroke(); }
                    }
                }
            }
        }
    }

    // Asker sayıları (yakınlaştırılmışsa)
    if (cs > 14) {
        ctx.font = `${Math.max(8, cs * 0.4)}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        for (let y = startY; y < endY; y++) {
            for (let x = startX; x < endX; x++) {
                const idx = y * GAME.gridW + x;
                const cell = GAME.grid[idx];
                if (cell.owner >= 0 && cell.troops > 0) {
                    const sx = x * cs - cam.x + cs / 2;
                    const sy = y * cs - cam.y + cs / 2;
                    ctx.fillStyle = 'rgba(255,255,255,0.9)';
                    ctx.fillText(Math.floor(cell.troops), sx, sy);
                }
            }
        }
    }

    // Oyuncu etiketleri
    if (cs > 3) {
        GAME.players.forEach(p => {
            if (!p.alive) return;
            // Oyuncunun merkezini bul
            let cx = 0, cy = 0, count = 0;
            for (let y = startY; y < endY; y++) {
                for (let x = startX; x < endX; x++) {
                    const idx = y * GAME.gridW + x;
                    if (GAME.grid[idx].owner === p.id) {
                        cx += x; cy += y; count++;
                    }
                }
            }
            if (count > 0) {
                cx = (cx / count) * cs - cam.x;
                cy = (cy / count) * cs - cam.y;
                const fontSize = Math.max(10, Math.min(18, cs * 1.5));
                ctx.font = `bold ${fontSize}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillText(p.name, cx + 1, cy + 1);
                ctx.fillStyle = '#fff';
                ctx.fillText(p.name, cx, cy);

                if (cs > 6) {
                    ctx.font = `${fontSize * 0.7}px Arial`;
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.fillText(`⚔${formatNum(p.troops)} 🏠${p.landCount}`, cx, cy + fontSize);
                }
            }
        });
    }

    // Hover efekti
    if (GAME.hoverCell) {
        const hx = GAME.hoverCell.x * cs - cam.x;
        const hy = GAME.hoverCell.y * cs - cam.y;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.strokeRect(hx, hy, cs, cs);

        // Hover bilgisi
        const idx = GAME.hoverCell.y * GAME.gridW + GAME.hoverCell.x;
        const cell = GAME.grid[idx];
        if (cell && cell.owner !== -2) {
            const infoX = hx + cs + 5;
            const infoY = hy;
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(infoX, infoY, 130, 55);
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1;
            ctx.strokeRect(infoX, infoY, 130, 55);

            ctx.font = '11px Arial';
            ctx.textAlign = 'left';
            ctx.fillStyle = '#fff';
            const ownerName = cell.owner === -1 ? 'Sahipsiz' : GAME.players[cell.owner]?.name || '?';
            ctx.fillText(`Sahip: ${ownerName}`, infoX + 5, infoY + 15);
            ctx.fillText(`Asker: ${Math.floor(cell.troops)}`, infoX + 5, infoY + 30);
            ctx.fillText(`Arazi: ${cell.terrain === 'plains' ? 'Ova' : cell.terrain === 'forest' ? 'Orman' : cell.terrain === 'mountain' ? 'Dağ' : 'Deniz'}`, infoX + 5, infoY + 45);
        }
    }

    // Mini harita
    renderMinimap();
}

function renderMinimap() {
    const mmW = 180, mmH = 180;
    mmCtx.fillStyle = '#0a1628';
    mmCtx.fillRect(0, 0, mmW, mmH);

    const scaleX = mmW / GAME.gridW;
    const scaleY = mmH / GAME.gridH;
    const pxSize = Math.max(1, Math.ceil(Math.max(scaleX, scaleY)));

    // Basitleştirilmiş render (her 2 hücrede bir)
    const step = Math.max(1, Math.floor(2 / Math.max(scaleX, scaleY)));

    for (let y = 0; y < GAME.gridH; y += step) {
        for (let x = 0; x < GAME.gridW; x += step) {
            const idx = y * GAME.gridW + x;
            const cell = GAME.grid[idx];

            if (cell.owner === -2) {
                mmCtx.fillStyle = '#0a1a30';
            } else if (cell.owner === -1) {
                mmCtx.fillStyle = '#2a2a1a';
            } else {
                mmCtx.fillStyle = GAME.players[cell.owner]?.color || '#333';
            }

            mmCtx.fillRect(
                Math.floor(x * scaleX),
                Math.floor(y * scaleY),
                pxSize + 1, pxSize + 1
            );
        }
    }

    // Kamera görüş alanı
    const cam = GAME.camera;
    const vx = (cam.x / (GAME.cellSize * cam.zoom)) * scaleX;
    const vy = (cam.y / (GAME.cellSize * cam.zoom)) * scaleY;
    const vw = (canvas.width / (GAME.cellSize * cam.zoom)) * scaleX;
    const vh = (canvas.height / (GAME.cellSize * cam.zoom)) * scaleY;

    mmCtx.strokeStyle = '#fff';
    mmCtx.lineWidth = 1;
    mmCtx.strokeRect(vx, vy, vw, vh);

    // Minimap'i ekrana çiz
    const mmDiv = document.getElementById('minimap');
    const mmDivCtx = mmDiv.querySelector('canvas');
    if (!mmDivCtx) {
        mmDiv.innerHTML = '';
        mmDiv.appendChild(mmCanvas);
        mmCanvas.style.display = 'block';
        mmCanvas.style.width = '100%';
        mmCanvas.style.height = '100%';
    }
}

function adjustBrightness(hex, factor) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgb(${Math.min(255, Math.floor(r * factor))},${Math.min(255, Math.floor(g * factor))},${Math.min(255, Math.floor(b * factor))})`;
}

function formatNum(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return Math.floor(n).toString();
}

// ==================================================================
//  UI GÜNCELLEME
// ==================================================================
function updateUI() {
    const p = GAME.players[GAME.playerID];
    if (!p) return;

    document.getElementById('myLand').textContent = p.landCount;
    document.getElementById('myTroops').textContent = formatNum(p.troops);
    document.getElementById('myIncome').textContent = `+${formatNum(p.landCount * 0.8)}/s`;
    document.getElementById('aliveCount').textContent = GAME.players.filter(p => p.alive).length;

    const mins = Math.floor(GAME.time / 60);
    const secs = Math.floor(GAME.time % 60);
    document.getElementById('gameTime').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

    updateLeaderboard();
}

function updateLeaderboard() {
    const sorted = [...GAME.players]
        .filter(p => p.alive)
        .sort((a, b) => b.landCount - a.landCount);

    let html = '';
    sorted.forEach((p, i) => {
        const isMe = p.id === GAME.playerID;
        html += `
            <div class="lb-entry ${isMe ? 'me' : ''}">
                <span class="lb-rank">${i + 1}</span>
                <div class="lb-color" style="background:${p.color}"></div>
                <span class="lb-name">${p.name}</span>
                <span class="lb-land">${p.landCount}</span>
                <span class="lb-troops">${formatNum(p.troops)}</span>
            </div>
        `;
    });
    document.getElementById('lbEntries').innerHTML = html;
}

function addNotification(text, type = '') {
    const el = document.createElement('div');
    el.className = `notification ${type}`;
    el.textContent = text;
    document.getElementById('notifications').appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

function checkWinCondition() {
    const alive = GAME.players.filter(p => p.alive);
    if (alive.length === 1 && alive[0].id === GAME.playerID) {
        endGame(true);
    }
    // Toplam karanın %80'ini kontrol ediyorsa
    const p = GAME.players[GAME.playerID];
    const totalLand = GAME.grid.filter(c => c.owner !== -2).length;
    if (p.landCount > totalLand * 0.8) {
        endGame(true);
    }
}

function endGame(won) {
    GAME.running = false;
    const p = GAME.players[GAME.playerID];
    document.getElementById('goTitle').textContent = won ? '🏆 Zafer!' : '💀 Yenildin!';
    document.getElementById('goStats').innerHTML =
        `Süre: ${Math.floor(GAME.time / 60)}:${Math.floor(GAME.time % 60).toString().padStart(2, '0')}<br>` +
        `Toprak: ${p.landCount} | Asker: ${formatNum(p.totalTroopsProduced)}`;
    document.getElementById('goScore').textContent = `Skor: ${p.landCount * 100 + Math.floor(p.totalTroopsProduced)}`;
    document.getElementById('gameOver').style.display = 'flex';
}

// ==================================================================
//  GİRDİ YÖNETİMİ
// ==================================================================
canvas.addEventListener('mousedown', (e) => {
    if (!GAME.running) return;
    if (e.button === 0) {
        // Sol tık - saldırı veya sürükleme
        GAME.dragging = true;
        GAME.dragStart = { x: e.clientX, y: e.clientY };
        GAME.camStart = { x: GAME.camera.x, y: GAME.camera.y };
    }
});

canvas.addEventListener('mousemove', (e) => {
    if (!GAME.running) return;

    // Dünya koordinatı
    const cs = GAME.cellSize * GAME.camera.zoom;
    const worldX = (e.clientX + GAME.camera.x) / cs;
    const worldY = (e.clientY + GAME.camera.y) / cs;
    const gx = Math.floor(worldX);
    const gy = Math.floor(worldY);

    if (gx >= 0 && gx < GAME.gridW && gy >= 0 && gy < GAME.gridH) {
        GAME.hoverCell = { x: gx, y: gy };
    } else {
        GAME.hoverCell = null;
    }

    if (GAME.dragging) {
        const dx = e.clientX - GAME.dragStart.x;
        const dy = e.clientY - GAME.dragStart.y;
        GAME.camera.x = GAME.camStart.x - dx;
        GAME.camera.y = GAME.camStart.y - dy;
    }
});

canvas.addEventListener('mouseup', (e) => {
    if (!GAME.running) return;

    if (GAME.dragging) {
        const dx = Math.abs(e.clientX - GAME.dragStart.x);
        const dy = Math.abs(e.clientY - GAME.dragStart.y);

        // Eğer az hareket ettiyse tıklama say
        if (dx < 5 && dy < 5) {
            const cs = GAME.cellSize * GAME.camera.zoom;
            const gx = Math.floor((e.clientX + GAME.camera.x) / cs);
            const gy = Math.floor((e.clientY + GAME.camera.y) / cs);

            if (gx >= 0 && gx < GAME.gridW && gy >= 0 && gy < GAME.gridH) {
                playerAttack(gx, gy);
            }
        }

        GAME.dragging = false;
    }
});

canvas.addEventListener('wheel', (e) => {
    if (!GAME.running) return;
    e.preventDefault();

    const oldZoom = GAME.camera.zoom;
    if (e.deltaY < 0) {
        GAME.camera.zoom = Math.min(GAME.camera.zoom * 1.15, 10);
    } else {
        GAME.camera.zoom = Math.max(GAME.camera.zoom / 1.15, 0.2);
    }

    // Fare noktasına doğru zoom
    const zoomRatio = GAME.camera.zoom / oldZoom;
    GAME.camera.x = e.clientX * (zoomRatio - 1) + GAME.camera.x * zoomRatio;
    GAME.camera.y = e.clientY * (zoomRatio - 1) + GAME.camera.y * zoomRatio;
}, { passive: false });

// Minimap tıklama
document.getElementById('minimap').addEventListener('click', (e) => {
    const rect = e.target.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / rect.width;
    const my = (e.clientY - rect.top) / rect.height;

    const cs = GAME.cellSize * GAME.camera.zoom;
    GAME.camera.x = mx * GAME.gridW * cs - canvas.width / 2;
    GAME.camera.y = my * GAME.gridH * cs - canvas.height / 2;
});

// Klavye
window.addEventListener('keydown', (e) => {
    if (!GAME.running) return;
    const moveSpeed = 20;
    if (e.key === 'w' || e.key === 'ArrowUp') GAME.camera.y -= moveSpeed;
    if (e.key === 's' || e.key === 'ArrowDown') GAME.camera.y += moveSpeed;
    if (e.key === 'a' || e.key === 'ArrowLeft') GAME.camera.x -= moveSpeed;
    if (e.key === 'd' || e.key === 'ArrowRight') GAME.camera.x += moveSpeed;
    if (e.key === ' ') {
        // Oyuncu topraklarına odaklan
        let cx = 0, cy = 0, count = 0;
        for (let y = 0; y < GAME.gridH; y++) {
            for (let x = 0; x < GAME.gridW; x++) {
                if (GAME.grid[y * GAME.gridW + x].owner === GAME.playerID) {
                    cx += x; cy += y; count++;
                }
            }
        }
        if (count > 0) {
            const cs = GAME.cellSize * GAME.camera.zoom;
            GAME.camera.x = (cx / count) * cs - canvas.width / 2;
            GAME.camera.y = (cy / count) * cs - canvas.height / 2;
        }
    }
});

// Dokunmatik
let touchStart = null;
let touchDist = 0;

canvas.addEventListener('touchstart', (e) => {
    if (!GAME.running) return;
    e.preventDefault();

    if (e.touches.length === 1) {
        touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        GAME.camStart = { x: GAME.camera.x, y: GAME.camera.y };
    } else if (e.touches.length === 2) {
        touchDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
    }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    if (!GAME.running) return;
    e.preventDefault();

    if (e.touches.length === 1 && touchStart) {
        const dx = e.touches[0].clientX - touchStart.x;
        const dy = e.touches[0].clientY - touchStart.y;
        GAME.camera.x = GAME.camStart.x - dx;
        GAME.camera.y = GAME.camStart.y - dy;
    } else if (e.touches.length === 2) {
        const newDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        const ratio = newDist / touchDist;
        GAME.camera.zoom = Math.max(0.2, Math.min(10, GAME.camera.zoom * ratio));
        touchDist = newDist;
    }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    if (!GAME.running) return;

    if (e.changedTouches.length === 1 && touchStart) {
        const dx = Math.abs(e.changedTouches[0].clientX - touchStart.x);
        const dy = Math.abs(e.changedTouches[0].clientY - touchStart.y);

        if (dx < 10 && dy < 10) {
            const cs = GAME.cellSize * GAME.camera.zoom;
            const gx = Math.floor((e.changedTouches[0].clientX + GAME.camera.x) / cs);
            const gy = Math.floor((e.changedTouches[0].clientY + GAME.camera.y) / cs);
            if (gx >= 0 && gx < GAME.gridW && gy >= 0 && gy < GAME.gridH) {
                playerAttack(gx, gy);
            }
        }
    }
    touchStart = null;
});

// ==================================================================
//  OYUN BAŞLATMA & DÖNGÜ
// ==================================================================
function startGame() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('topBar').style.display = 'flex';
    document.getElementById('leaderboard').style.display = 'block';
    document.getElementById('minimap').style.display = 'block';
    document.getElementById('controls').style.display = 'block';
    document.getElementById('zoomControls').style.display = 'flex';
    document.getElementById('speedControls').style.display = 'flex';
    document.getElementById('gameOver').style.display = 'none';

    generateMap();
    createPlayers();

    GAME.running = true;
    GAME.time = 0;
    GAME.tick = 0;
    GAME.speed = 1;

    document.querySelectorAll('.speed-btn').forEach(e => e.classList.remove('active'));
    document.querySelector('.speed-btn[data-speed="1"]').classList.add('active');

    updateUI();
}

// Ana oyun döngüsü
let lastTime = 0;
let tickAccumulator = 0;
const TICK_RATE = 1000 / 30; // 30 tick/saniye

function gameLoop(timestamp) {
    requestAnimationFrame(gameLoop);

    const dt = timestamp - lastTime;
    lastTime = timestamp;

    if (GAME.running && GAME.speed > 0) {
        tickAccumulator += dt * GAME.speed;

        while (tickAccumulator >= TICK_RATE) {
            gameTick();
            tickAccumulator -= TICK_RATE;
        }
    }

    render();
}

requestAnimationFrame(gameLoop);
</script>
